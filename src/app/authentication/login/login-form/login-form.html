<form
  [formGroup]="loginForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-y-5"
>
  <div class="flex flex-col gap-1">
    <label for="email">Email</label>
    <input
      formControlName="email"
      type="email"
      id="email"
      autocomplete="email"
      placeholder="Your email"
      required
      minlength="5"
      maxlength="255"
      class="border border-gray-300 rounded px-2.5 py-1 placeholder:text-gray-400 placeholder:text-sm"
    />
  </div>

  <div class="flex flex-col gap-1">
    <label for="password">Password</label>
    <input
      formControlName="password"
      type="password"
      id="password"
      autocomplete="current-password"
      placeholder="Your password"
      required
      class="border border-gray-300 rounded px-2.5 py-1 placeholder:text-gray-400 placeholder:text-sm"
    />
  </div>

  <div>
    <button
      [disabled]="!loginForm.valid"
      type="submit"
      class="bg-black text-white px-2.5 py-1 rounded w-full cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed"
    >
      Login
    </button>
  </div>
</form>
