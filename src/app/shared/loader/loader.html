@if (isVisible() > 0) {
<div
  class="fixed inset-0 bg-white/80 backdrop-blur-md flex items-center justify-center z-[9999]"
>
  <div
    class="bg-white rounded-2xl shadow-2xl border border-gray-100 p-8 flex flex-col items-center gap-6 min-w-[200px]"
  >
    <div class="relative w-16 h-16">
      <div class="absolute inset-0 rounded-full border-4 border-gray-200"></div>
      <div
        class="absolute inset-0 rounded-full border-4 border-transparent border-t-black animate-spin"
      ></div>
      <div class="absolute inset-2 rounded-full border-2 border-gray-100"></div>
      <div
        class="absolute inset-2 rounded-full border-2 border-transparent border-t-gray-400 animate-spin"
        style="animation-duration: 1.5s; animation-direction: reverse"
      ></div>
    </div>

    <div class="text-center">
      <p class="text-gray-900 text-lg font-semibold tracking-wide">Loading</p>
      <div class="flex justify-center mt-2 space-x-1">
        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
        <div
          class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"
          style="animation-delay: 0.1s"
        ></div>
        <div
          class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"
          style="animation-delay: 0.2s"
        ></div>
      </div>
    </div>
  </div>
</div>
}
