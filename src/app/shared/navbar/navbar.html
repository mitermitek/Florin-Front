<nav class="bg-white border-b border-gray-200">
  <div
    class="container flex justify-between items-center mx-auto px-4 py-2 max-w-2xl"
  >
    <a routerLink="/" class="text-2xl font-bold">Florin</a>

    <div class="flex items-center gap-x-4">
      @if (isAuthenticated()) {
      <button
        type="button"
        (click)="logout()"
        class="bg-red-600 rounded p-1 text-white focus:outline-none cursor-pointer"
      >
        <i-lucide [img]="LogOutIcon" [size]="18"></i-lucide>
      </button>
      }

      <button
        type="button"
        (click)="toggleMenu()"
        class="focus:outline-none cursor-pointer"
      >
        <i-lucide [img]="isMenuOpen() ? XIcon : MenuIcon"></i-lucide>
      </button>
    </div>
  </div>

  @if (isMenuOpen()) {
  <div class="bg-white border-t border-gray-200">
    <div
      class="container flex flex-col items-start justify-center mx-auto px-4 py-2 max-w-2xl space-y-2"
    >
      @if (isAuthenticated()) {
      <a routerLink="/" (click)="closeMenu()" class="w-full">Home</a>
      <a routerLink="/transactions" (click)="closeMenu()" class="w-full">Transactions</a>
      <a routerLink="/categories" (click)="closeMenu()" class="w-full">Categories</a>
      } @else {
      <a routerLink="/login" (click)="closeMenu()" class="w-full">Sign in</a>
      <a routerLink="/register" (click)="closeMenu()" class="w-full">Sign up</a>
      }
    </div>
  </div>
  }
</nav>
