<div class="fixed bottom-4 right-4 z-50 space-y-3 flex flex-col items-end">
  @for (toast of toasts(); track toast.id) {
  <div
    class="max-w-xs bg-white border border-gray-200 rounded-xl shadow-lg"
    role="alert"
    tabindex="-1"
    aria-labelledby="toast-description"
  >
    <div class="flex p-4">
      <div class="shrink-0">
        @if (toast.type === "info") {
        <i-lucide [img]="InfoIcon" [size]="18" class="text-blue-500"></i-lucide>
        }

        @if (toast.type === "success") {
        <i-lucide [img]="CircleCheckBigIcon" [size]="18" class="text-teal-500"></i-lucide>
        }

        @if (toast.type === "error") {
        <i-lucide [img]="OctagonXIcon" [size]="18" class="text-red-500"></i-lucide>
        }
      </div>
      <div class="ms-3">
        <p id="toast-description" class="text-sm text-gray-70">
          {{ toast.message }}
        </p>
      </div>
    </div>
  </div>
  }
</div>
