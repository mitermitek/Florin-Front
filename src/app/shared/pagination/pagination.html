@if (meta() && meta().last_page > 1) {
<nav aria-label="Pagination" class="flex flex-col items-center gap-4">
  <div class="flex items-center space-x-2">
    <!-- First page icon -->
    <button
      class="flex items-center justify-center w-10 h-10 text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-1 transition-colors"
      (click)="goToPage(1)"
      [disabled]="meta().current_page === 1"
      title="Go to first page"
    >
      <i-lucide [img]="ChevronFirstIcon"></i-lucide>
    </button>

    <!-- Previous button -->
    <button
      class="flex items-center justify-center w-10 h-10 text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-1 transition-colors"
      (click)="goToPage(meta().current_page - 1)"
      [disabled]="!links().prev"
      title="Previous page"
    >
      <i-lucide [img]="ChevronLeftIcon"></i-lucide>
    </button>

    <!-- Visible pages -->
    @for (page of paginationData().visiblePages; track $index) {
    <button
      class="flex items-center justify-center w-10 h-10 text-sm font-medium border rounded cursor-pointer focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-1"
      [class]="page === meta().current_page
        ? 'text-white bg-black border-black hover:bg-gray-800'
        : 'text-gray-700 bg-white border-gray-300 hover:bg-gray-50'"
      (click)="goToPage(page)"
    >
      {{ page }}
    </button>
    }

    <!-- Next button -->
    <button
      class="flex items-center justify-center w-10 h-10 text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-1 transition-colors"
      (click)="goToPage(meta().current_page + 1)"
      [disabled]="!links().next"
      title="Next page"
    >
      <i-lucide [img]="ChevronRightIcon"></i-lucide>
    </button>

    <!-- Last page icon -->
    <button
      class="flex items-center justify-center w-10 h-10 text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-1 transition-colors"
      (click)="goToPage(meta().last_page)"
      [disabled]="meta().current_page === meta().last_page"
      title="Go to last page"
    >
      <i-lucide [img]="ChevronLastIcon"></i-lucide>
    </button>
  </div>

  <!-- Pagination info -->
  @if (showInfo()) {
  <div class="text-sm text-gray-500 text-center">
    Showing {{ meta().from }} to {{ meta().to }} of {{ meta().total }} results
  </div>
  }
</nav>
}
